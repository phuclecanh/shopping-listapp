<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .input-row input {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    .input-row button:hover { background: #4338ca; }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 10px;
      font-size: 0.8rem;
      color: #64748b;
    }

    .stats .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .stats .clear-btn:hover { background: #fef2f2; }

    ul {
      list-style: none;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 460px;
      overflow-y: auto;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      transition: opacity 0.2s;
    }

    li.checked { opacity: 0.55; }

    li.checked .item-name {
      text-decoration: line-through;
      color: #94a3b8;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .empty span { font-size: 2rem; display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Shopping List</h1>
      <p id="header-sub">Your items at a glance</p>
    </header>

    <div class="input-row">
      <input id="item-input" type="text" placeholder="Add an item..." maxlength="80" />
      <button id="add-btn" title="Add item">+</button>
    </div>

    <div class="stats">
      <span id="stats-label"></span>
      <button class="clear-btn" id="clear-checked-btn" style="display:none">Clear checked</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const input = document.getElementById('item-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('list');
    const statsLabel = document.getElementById('stats-label');
    const clearCheckedBtn = document.getElementById('clear-checked-btn');
    const headerSub = document.getElementById('header-sub');

    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function updateStats() {
      const total = items.length;
      const checked = items.filter(i => i.checked).length;
      statsLabel.textContent = total === 0 ? '' : `${checked} of ${total} checked`;
      clearCheckedBtn.style.display = checked > 0 ? 'inline' : 'none';
      headerSub.textContent = total === 0
        ? 'Your items at a glance'
        : checked === total && total > 0
          ? 'All done!'
          : `${total - checked} item${total - checked !== 1 ? 's' : ''} remaining`;
    }

    function render() {
      list.innerHTML = '';
      if (items.length === 0) {
        list.innerHTML = '<li class="empty"><span>🛒</span>Your list is empty. Add something!</li>';
        updateStats();
        return;
      }

      items.forEach((item, i) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => {
          items[i].checked = cb.checked;
          save();
          render();
        });

        const name = document.createElement('span');
        name.className = 'item-name';
        name.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = 'Delete';
        del.addEventListener('click', () => {
          items.splice(i, 1);
          save();
          render();
        });

        li.append(cb, name, del);
        list.appendChild(li);
      });

      updateStats();
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) return;
      items.push({ name, checked: false });
      input.value = '';
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    clearCheckedBtn.addEventListener('click', () => {
      items = items.filter(i => !i.checked);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
